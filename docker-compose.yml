
networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: simple_website
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: .
    container_name: webapp
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - app-network
    environment:
      SPW_PG_HOST: postgres
      SPW_PG_PORT: 5432
      SPW_PG_DATABASE: simple_website
      SPW_PG_USER: postgres
      SPW_PG_PASSWORD: password
      SPW_MIGRATIONS_FILENAME: migrations.json
      SPW_DATA_DIRECTORY: /app/data
      SPW_STATIC_FILES_DIRECTORY: /app/static
      SPW_COOKIE_SECRET: some-secret-value
      SPW_PASSWORD_SECRET: some-other-secret-value
      SPW_PORT: 80
      SPW_SESSION_TTL: 10
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3