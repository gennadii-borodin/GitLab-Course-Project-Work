stages:
  - static-analysis
  - test-setup
  - testing
  - deploy-manual

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: 1
  DOCKER_HOST: "tcp://docker:2376"
  DOCKER_CERT_PATH: "/certs/client"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
  key: ${CI_COMMIT_REF_SLUG}

static-analysis:
  stage: static-analysis
  image: python:3.14-slim
  tags:
    - course-runner
  script:
    - pip install ruff bandit
    - ruff check .
    - bandit -r .
  artifacts:
    reports:
      codequality: gl-code-quality-report.json
    paths:
      - gl-code-quality-report.json
    expire_in: 1 week

test-setup:
  stage: test-setup
  services:
    - postgres:17-alpine
  variables:
    POSTGRES_DB: test_db
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_password
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
  script:
    - echo "Ожидание готовности PostgreSQL..."
    - while ! pg_isready -h postgres -U test_user -d test_db; do sleep 2; done
    - echo "PostgreSQL готов"
    - echo "Применение миграций..."
    - python3 -m datastore.store migrate
    - echo "Загрузка тестовых данных..."
    - python3 -m datastore.store import_test_data
    - echo "Тестовый стенд развёрнут"
  tags:
    - course-runner

testing:
  stage: testing
  image: docker:20.10
  services:
    - docker:20.10-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: 1
  before_script:
    - apk add --no-cache py3-pip
    - pip install docker-compose
  script:
    - docker build -f Dockerfile.test -t web-test .
    - docker run --network host --name web-test web-test &
    - sleep 10
    - docker ps
    - docker logs web-test
    - docker run --network host -v $(pwd)/allure-results:/app/allure-results -v $(pwd)/coverage-report:/app/coverage-report -e TEST_BASE_URL=http://localhost:8080 web-test pytest --alluredir=/app/allure-results --cov=api --cov=datastore --cov-report=html:/app/coverage-report --cov-report=term-missing
  artifacts:
    reports:
      junit: junit.xml
    paths:
      - allure-results/
      - coverage-report/
      - junit.xml
    expire_in: 1 week
  tags:
    - course-runner

deploy-manual:
  stage: deploy-manual
  image: docker:20.10
  services:
    - docker:20.10-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: 1
  before_script:
    - apk add --no-cache py3-pip
    - pip install docker-compose
  script:
    - docker-compose down
    - docker-compose up -d
    - echo "Приложение развёрнуто"
  environment:
    name: production
    url: http://localhost
    on_stop: stop_production
  when: manual
  allow_failure: false
  tags:
    - course-runner

stop_production:
  stage: deploy-manual
  image: docker:20.10
  services:
    - docker:20.10-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: 1
  before_script:
    - apk add --no-cache py3-pip
    - pip install docker-compose
  script:
    - docker-compose down
    - echo "Приложение остановлено"
  environment:
    name: production
    action: stop
  when: manual
  allow_failure: false
  tags:
    - course-runner