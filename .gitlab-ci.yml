stages:
  - package
  - static-analysis
  - test
  - deploy-manual

.python-base:
  image: 
    name: python:3.14-slim
    pull_policy: if-not-present
  before_script:
    - mkdir -p .cache/pip
    - apt-get update && apt-get install -y --no-install-recommends postgresql-client jq curl
    - apt-get clean && rm -rf /var/lib/apt/lists/*

variables:
  WEB_IMAGE_NAME: $CI_REGISTRY_IMAGE/ewb-app
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  # DOCKER_TLS_CERTDIR: "/certs"
  # DOCKER_TLS_VERIFY: 0
  DOCKER_HOST: "tcp://docker:2375"
  # DOCKER_CERT_PATH: "/certs/client"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_VERSION: "29.3"

cache:
  paths:
    - .cache/pip
  key: ${CI_COMMIT_REF_SLUG}

static-security-analysis:
  stage: static-analysis
  extends: .python-base
  tags:
    - course_runner
  script:
    - apt-get update && apt-get install -y jq
    - pip install bandit

    - echo ===== start Bandit =====
    - bandit -r . -f json -o bandit-report.json || true
    - export BANDIT_ISSUES_COUNT=$(jq '.results | length' bandit-report.json)
    - echo "Найдено уязвимостей - $BANDIT_ISSUES_COUNT"
    - if [ "$BANDIT_ISSUES_COUNT" -gt "0" ]; then exit 1; fi
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 1 week
  allow_failure: true

static-code-analysis:
  stage: static-analysis
  extends: .python-base
  tags:
    - course_runner
  script:
  - apt-get update && apt-get install -y jq
  - pip install ruff
  - echo ===== start Ruf check =====
  - ruff check . --output-format gitlab -o ruff-report.json || true
  - export RUFF_ISSUES_COUNT=$(jq 'length' ruff-report.json)
  - echo "Найдено проблем - $RUFF_ISSUES_COUNT"
  - export ERROR_COUNT=$(jq '[.[] | select(.severity == "major")] | length' ruff-report.json)
  - echo "Errors - $ERROR_COUNT"
  - if [ "$ERROR_COUNT" -gt "0" ]; then exit 1; fi

  artifacts:
    reports:
      codequality: ruff-report.json
    paths:
      - ruff-report.json
    expire_in: 1 week
  allow_failure: true

package:
  stage: package
  image:
    name: docker:${DOCKER_VERSION}-cli
    pull_policy: if-not-present
  
  tags:
    - course_runner
  services:
    - docker:${DOCKER_VERSION}-dind

  before_script:

    #Docker login
    - |
      if [ -n "$CI_REGISTRY_USER" ] && [ -n "$CI_REGISTRY_PASSWORD" ]; then
        echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
      fi

  script:
      - docker pull $WEB_IMAGE_NAME:cache-latest || true
      - docker pull $WEB_IMAGE_NAME:latest || true
    # Build image
      - |
        docker build \
          --cache-from $WEB_IMAGE_NAME:cache-latest \
          --cache-from $WEB_IMAGE_NAME:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t $WEB_IMAGE_NAME:$CI_COMMIT_SHORT_SHA \
          -t $WEB_IMAGE_NAME:latest \
          -f Dockerfile \
            .
    # Push images
      - docker push $WEB_IMAGE_NAME:$CI_COMMIT_SHORT_SHA
      - docker push $WEB_IMAGE_NAME:latest
      
    # Update image for master. The idea is to keep cache beetwen jobs. Only for (probably)) stable branch
    # May be it worth a separate job. TBD
      - |
        if [[ "$CI_COMMIT_BRANCH" == "main" ]]; then
          docker tag $WEB_IMAGE_NAME:latest $WEB_IMAGE_NAME:cache-latest
          docker push $WEB_IMAGE_NAME:cache-latest
          echo "Updated cache-latest for main branch"
        fi
  rules:
      - if: $CI_COMMIT_BRANCH || $CI_COMMIT_TAG

testing:
  extends: .python-base
  stage: test
  needs: ["package"]
  variables:
    POSTGRES_DB: test_db
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_password
    SPW_PORT: 9999
    SPW_PG_HOST: postgres
    SPW_PG_PORT: 5432
    SPW_PG_USER: test_user
    SPW_PG_PASSWORD: test_password
    SPW_PG_DATABASE: test_db
    SPW_MIGRATIONS_FILENAME: migrations.json
    SPW_DATA_DIRECTORY: /app/data
    SPW_STATIC_FILES_DIRECTORY: /app/static
    SPW_COOKIE_SECRET: some-secret-value
    SPW_PASSWORD_SECRET: some-other-secret-value
    TEST_BASE_URL: http://web-test:$SPW_PORT
  
  services:
    - name: postgres:17-alpine
      pull_policy: if-not-present
      alias: postgres
    
    - name: $WEB_IMAGE_NAME:$CI_COMMIT_SHORT_SHA
      alias: web-test
      
  script:
    - echo "Ожидание готовности PostgreSQL..."
    - until pg_isready -h postgres -U test_user -d test_db; do sleep 2; done
    - echo "PostgreSQL готов"
    - echo "Ожидание готовности веб-приложения..."
    - until curl -f http://web-test:$SPW_PORT/ 2>/dev/null; do sleep 2; done
    - echo "Веб-приложение готово"
    - echo "Установка зависимостей для тестов..."
    - pip install --cache-dir $PIP_CACHE_DIR -r tests/requirements-test.txt
    - echo "Запуск тестов..."
    - pytest --tb=short --no-summary --no-header  --alluredir=allure-results --cov=api --cov=datastore --cov-report=html:coverage-report --cov-report=term-missing --junitxml=junit.xml
  artifacts:
    when: always                    
    reports:
      junit: junit.xml             
    paths:
      - allure-results/            
      - coverage-report/          
      - app/logs/            
    expire_in: 1 week
    name: "test-results-${CI_COMMIT_SHORT_SHA}" 

  tags:
    - course_runner
  allow_failure: true

generate_and_publish_report:
  stage: test
  dependencies:
    - testing
  image: frankescobar/allure-docker-service:latest
  script:
    - allure generate allure-results -o allure-report --clean
    - echo "Публикация Allure отчета на Pages..."
    - mkdir -p public
    - cp -r allure-report/* public/ 
    - ls -la public/
   
  artifacts:
    paths:
      - public                     
    expire_in: 1 week
    name: "allure-pages-${CI_COMMIT_SHORT_SHA}"
    when: always
  pages: true # не работает в облаке яндекса
  
  tags:
    - course_runner


deploy-manual:
  stage: deploy-manual
  image: docker:20.10
  services:
    - docker:20.10-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: 1
  before_script:
    - apk add --no-cache py3-pip
    - pip install docker-compose
  script:
    - docker-compose down
    - docker-compose up -d
    - echo "Приложение развёрнуто"
  environment:
    name: production
    url: http://localhost
    on_stop: stop_production
  when: manual
  allow_failure: false
  tags:
    - course_runner

stop_production:
  stage: deploy-manual
  image: docker:20.10
  services:
    - docker:20.10-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: 1
  before_script:
    - apk add --no-cache py3-pip
    - pip install docker-compose
  script:
    - docker-compose down
    - echo "Приложение остановлено"
  environment:
    name: production
    action: stop
  when: manual
  allow_failure: false
  tags:
    - course_runner